<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LSAT 错题本</title>
<style>
  :root {
    --bg: #f7f7f5;
    --panel: #ffffff;
    --border: #e4e4e0;
    --text: #1f2933;
    --muted: #6b7280;
    --accent: #2f5d9f;
    --accent-soft: #eaf1fb;
    --danger: #b9453f;
    --success: #2f7d52;
    --warn: #a36a1a;
    --lr: #2f5d9f;
    --rc: #2f7d52;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .stats {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .stats span b { color: var(--text); font-weight: 600; }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 28px 80px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .panel h2 {
    margin: 0 0 14px;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  input[type="text"], input[type="number"], input[type="date"], select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
    margin-bottom: 12px;
  }
  textarea { resize: vertical; min-height: 64px; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    cursor: pointer;
    transition: 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  button.primary:hover { background: #264e87; color: #fff; }
  button.danger { color: var(--danger); }
  button.danger:hover { background: #fbecea; border-color: var(--danger); color: var(--danger); }
  .toolbar {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .toolbar .left, .toolbar .right { display: flex; gap: 8px; flex-wrap: wrap; }
  .search {
    width: 220px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    margin: 0;
  }
  .list { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: #eef0f2;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .tag.section-LR { background: #eaf1fb; color: var(--lr); }
  .tag.section-RC { background: #e8f3ec; color: var(--rc); }
  .tag.diff-level1 { background: #e8f3ec; color: var(--success); }
  .tag.diff-level2 { background: #eaf1fb; color: var(--accent); }
  .tag.diff-level3 { background: #fbf1e0; color: var(--warn); }
  .tag.diff-level4 { background: #fbecea; color: var(--danger); }
  .card-actions { display: flex; gap: 6px; }
  .card-actions button { padding: 4px 10px; font-size: 12px; }
  .field { margin-top: 10px; }
  .field-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .field-body {
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 14px;
  }
  .answer-line { display: flex; gap: 16px; font-size: 14px; margin-top: 8px; }
  .answer-line .wrong { color: var(--danger); }
  .answer-line .right { color: var(--success); }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 14px;
  }
  .meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  .filter-group { margin-bottom: 12px; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    cursor: pointer;
    color: var(--muted);
  }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .image-previews { display: flex; gap: 8px; flex-wrap: wrap; margin: -4px 0 12px; }
  .thumb {
    position: relative;
    width: 72px;
    height: 72px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: #f0f0ed;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
  .thumb .remove {
    position: absolute;
    top: 2px; right: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.65);
    color: #fff;
    font-size: 12px;
    line-height: 1;
    padding: 0;
    cursor: pointer;
  }
  .thumb .remove:hover { background: var(--danger); color: #fff; }
  .card-images { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .card-images img {
    max-width: 100%;
    max-height: 240px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: zoom-in;
  }
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: zoom-out;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 96%; max-height: 96%; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  details summary {
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    padding: 4px 0;
  }
  details[open] summary { color: var(--text); }

  .auth-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .auth-overlay.open { display: flex; }
  .auth-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .auth-card h2 {
    margin: 0 0 6px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    color: var(--text);
    text-transform: none;
    letter-spacing: 0;
  }
  .auth-card p.sub {
    margin: 0 0 22px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
  }
  .auth-tabs button {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    border-radius: 0;
  }
  .auth-tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .auth-error {
    color: var(--danger);
    font-size: 13px;
    min-height: 18px;
    margin: -4px 0 10px;
  }
  .auth-info {
    color: var(--success);
    font-size: 13px;
    margin: -4px 0 10px;
  }
  .user-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .user-badge b { color: var(--text); font-weight: 500; }
  .user-badge button {
    padding: 4px 10px;
    font-size: 12px;
  }
  .sync-indicator {
    font-size: 12px;
    color: var(--muted);
  }
  .sync-indicator.syncing { color: var(--warn); }
  .sync-indicator.error { color: var(--danger); }

  .main-tabs {
    display: flex;
    gap: 4px;
    background: #eef0f2;
    padding: 4px;
    border-radius: 8px;
  }
  .main-tabs button {
    padding: 7px 18px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
  }
  .main-tabs button.active {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .view-vocab-only, .view-mistake-only { display: none; }
  body[data-view="mistakes"] .view-mistake-only { display: block; }
  body[data-view="mistakes"] .view-mistake-only.flex { display: flex; }
  body[data-view="vocab"] .view-vocab-only { display: block; }
  body[data-view="vocab"] .view-vocab-only.flex { display: flex; }
</style>
</head>
<body data-view="mistakes">
<header>
  <div style="display:flex; align-items:center; gap:24px;">
    <h1>LSAT 学习本</h1>
    <div class="main-tabs" id="mainTabs">
      <button data-view="mistakes" class="active" type="button">错题本</button>
      <button data-view="vocab" type="button">生词本</button>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
    <div class="stats" id="stats"></div>
    <span class="sync-indicator" id="syncIndicator"></span>
    <div class="user-badge" id="userBadge" style="display:none;">
      <b id="userEmail"></b>
      <button id="signOutBtn">退出</button>
    </div>
  </div>
</header>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2>LSAT 错题本</h2>
    <p class="sub">登录后错题会云端同步，换设备也不会丢</p>
    <div class="auth-tabs">
      <button data-tab="signin" class="active" type="button">登录</button>
      <button data-tab="signup" type="button">注册</button>
    </div>
    <form id="authForm">
      <label>邮箱</label>
      <input type="email" id="authEmail" required autocomplete="email" />
      <label>密码</label>
      <input type="password" id="authPassword" required minlength="6" autocomplete="current-password" placeholder="至少 6 位" />
      <div class="auth-error" id="authError"></div>
      <div class="auth-info" id="authInfo"></div>
      <button type="submit" class="primary" id="authSubmit" style="width:100%;">登录</button>
    </form>
  </div>
</div>

<main>
  <aside>
    <div class="panel view-mistake-only" id="formPanel">
      <h2 id="formTitle">新增错题</h2>
      <form id="entryForm">
        <input type="hidden" id="entryId" />
        <div class="row">
          <div>
            <label>科目</label>
            <select id="section" required>
              <option value="LR">Logical Reasoning</option>
              <option value="RC">Reading Comprehension</option>
            </select>
          </div>
          <div>
            <label>难度</label>
            <select id="difficulty">
              <option value="level1">Level 1</option>
              <option value="level2" selected>Level 2</option>
              <option value="level3">Level 3</option>
              <option value="level4">Level 4</option>
            </select>
          </div>
        </div>
        <div class="row-3">
          <div>
            <label>PT / 来源</label>
            <input type="text" id="source" placeholder="如 PT90" />
          </div>
          <div>
            <label>Section</label>
            <input type="text" id="sectionNum" placeholder="如 S2" />
          </div>
          <div>
            <label>题号</label>
            <input type="text" id="qnum" placeholder="如 Q14" />
          </div>
        </div>
        <label>题型标签（逗号分隔）</label>
        <input type="text" id="qtype" placeholder="如 Assumption, Flaw, Parallel" />

        <label>题干 / 原题（支持粘贴或上传截图）</label>
        <textarea id="question" placeholder="粘贴题干文本，或在此 Cmd+V 粘贴截图..."></textarea>
        <div style="display:flex; gap:8px; align-items:center; margin:-4px 0 8px;">
          <button type="button" id="uploadBtn">上传图片</button>
          <input type="file" id="uploadInput" accept="image/*" multiple style="display:none;" />
          <span style="font-size:12px; color:var(--muted);">支持多选，也可拖拽图片到此区域</span>
        </div>
        <div class="image-previews" id="imagePreviews"></div>

        <div class="row">
          <div>
            <label>你的答案</label>
            <input type="text" id="myAnswer" list="answerOptions" placeholder="A-E" autocomplete="off" />
          </div>
          <div>
            <label>正确答案</label>
            <input type="text" id="correctAnswer" list="answerOptions" placeholder="A-E" autocomplete="off" />
          </div>
        </div>
        <datalist id="answerOptions">
          <option value="A"></option>
          <option value="B"></option>
          <option value="C"></option>
          <option value="D"></option>
          <option value="E"></option>
        </datalist>

        <label>错因分析</label>
        <textarea id="reason" placeholder="为什么错？陷阱在哪里？"></textarea>

        <label>正确思路 / 反思</label>
        <textarea id="reflection" placeholder="下次如何避免同样的错误"></textarea>

        <div class="row">
          <div>
            <label>日期</label>
            <input type="date" id="date" />
          </div>
          <div>
            <label>用时（秒）</label>
            <input type="number" id="time" min="0" placeholder="可选" />
          </div>
        </div>

        <div style="display:flex; gap:8px; margin-top:6px;">
          <button type="submit" class="primary" id="submitBtn">保存错题</button>
          <button type="button" id="cancelBtn" style="display:none;">取消</button>
        </div>
      </form>
    </div>

    <div class="panel view-vocab-only" id="vocabFormPanel">
      <h2 id="vocabFormTitle">新增生词</h2>
      <form id="vocabForm">
        <input type="hidden" id="vocabId" />
        <label>单词</label>
        <input type="text" id="vocabWord" required placeholder="如 perfunctory" autocomplete="off" />

        <label>释义</label>
        <textarea id="vocabDefinition" required placeholder="中文 / 英文 / 两者都行"></textarea>

        <label>例句 / 出处</label>
        <textarea id="vocabExample" placeholder="在哪看到的？原句是什么？"></textarea>

        <label>笔记（词根、同义词、记忆法）</label>
        <textarea id="vocabNotes" placeholder="可选"></textarea>

        <div class="row">
          <div>
            <label>来源</label>
            <input type="text" id="vocabSource" placeholder="如 PT90 LR" />
          </div>
          <div>
            <label>日期</label>
            <input type="date" id="vocabDate" />
          </div>
        </div>

        <div style="display:flex; gap:8px; margin-top:6px;">
          <button type="submit" class="primary" id="vocabSubmitBtn">保存生词</button>
          <button type="button" id="vocabCancelBtn" style="display:none;">取消</button>
        </div>
      </form>
    </div>

    <div class="panel" style="margin-top:16px;">
      <h2>数据</h2>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button id="exportBtn">导出 JSON</button>
        <button id="importBtn">导入 JSON</button>
        <input type="file" id="importFile" accept="application/json" style="display:none;" />
        <button id="clearBtn" class="danger">清空全部</button>
      </div>
      <p style="font-size:12px; color:var(--muted); margin:12px 0 0;">
        所有错题保存在云端 Supabase 数据库，登录后任意设备/浏览器访问均可同步。
      </p>
    </div>
  </aside>

  <section>
    <div class="toolbar view-mistake-only flex">
      <div class="left">
        <div class="chip-row" id="sectionFilter">
          <button class="chip active" data-section="all">全部</button>
          <button class="chip" data-section="LR">LR</button>
          <button class="chip" data-section="RC">RC</button>
        </div>
      </div>
      <div class="right">
        <input type="text" id="search" class="search" placeholder="搜索题干、题型、错因..." />
        <select id="sortBy" style="margin:0; width:auto;">
          <option value="date-desc">最新优先</option>
          <option value="date-asc">最早优先</option>
          <option value="difficulty">按难度</option>
          <option value="section">按科目</option>
        </select>
      </div>
    </div>

    <div class="toolbar view-vocab-only flex">
      <div class="left"></div>
      <div class="right">
        <input type="text" id="vocabSearch" class="search" placeholder="搜索单词、释义、例句..." />
        <select id="vocabSortBy" style="margin:0; width:auto;">
          <option value="date-desc">最新优先</option>
          <option value="date-asc">最早优先</option>
          <option value="word-asc">按单词 A-Z</option>
          <option value="word-desc">按单词 Z-A</option>
        </select>
      </div>
    </div>

    <div class="list" id="list"></div>
  </section>
</main>

<div class="lightbox" id="lightbox"><img id="lightboxImg" alt="" /></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} 超时 (${ms/1000}s)`)), ms)),
  ]);
}

const SECTION_LABEL = { LR: 'LR', RC: 'RC' };
const DIFF_LABEL = { level1: 'Level 1', level2: 'Level 2', level3: 'Level 3', level4: 'Level 4' };
const DIFF_ORDER = { level1: 1, level2: 2, level3: 3, level4: 4 };

let currentUser = null;
let entries = [];
let currentView = 'mistakes';
let currentSection = 'all';
let currentSort = 'date-desc';
let currentSearch = '';
let editingId = null;
let formImages = [];
let authMode = 'signin';
let currentVocabSearch = '';
let currentVocabSort = 'date-desc';
let vocabEditingId = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function esc(s) { return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function entryType(e) { return e.type === 'vocab' ? 'vocab' : 'mistake'; }

function render() {
  const list = document.getElementById('list');
  if (currentView === 'vocab') {
    renderVocab(list);
  } else {
    renderMistakes(list);
  }
  renderStats();
}

function renderMistakes(list) {
  let filtered = entries.filter(e => entryType(e) === 'mistake');
  const totalMistakes = filtered.length;
  if (currentSection !== 'all') filtered = filtered.filter(e => e.section === currentSection);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(e =>
      (e.question || '').toLowerCase().includes(q) ||
      (e.qtype || '').toLowerCase().includes(q) ||
      (e.reason || '').toLowerCase().includes(q) ||
      (e.reflection || '').toLowerCase().includes(q) ||
      (e.source || '').toLowerCase().includes(q) ||
      (e.sectionNum || '').toLowerCase().includes(q) ||
      (e.qnum || '').toLowerCase().includes(q)
    );
  }
  filtered.sort((a, b) => {
    if (currentSort === 'date-asc') return (a.date || '').localeCompare(b.date || '');
    if (currentSort === 'date-desc') return (b.date || '').localeCompare(a.date || '');
    if (currentSort === 'difficulty') return (DIFF_ORDER[b.difficulty] || 0) - (DIFF_ORDER[a.difficulty] || 0);
    if (currentSort === 'section') return (a.section || '').localeCompare(b.section || '');
    return 0;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${totalMistakes === 0 ? '还没有错题。在左侧填写第一道错题开始复盘。' : '当前筛选下没有结果。'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(e => `
    <article class="card" data-id="${e.id}">
      <div class="card-head">
        <div class="tags">
          <span class="tag section-${e.section}">${SECTION_LABEL[e.section] || e.section}</span>
          <span class="tag diff-${e.difficulty}">${DIFF_LABEL[e.difficulty] || ''}</span>
          ${renderRefTag(e)}
          ${e.qtype ? e.qtype.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="tag">${esc(t)}</span>`).join('') : ''}
        </div>
        <div class="card-actions">
          <button data-action="edit">编辑</button>
          <button data-action="delete" class="danger">删除</button>
        </div>
      </div>
      ${e.question ? `<div class="field"><div class="field-label">题干</div><div class="field-body">${esc(e.question)}</div></div>` : ''}
      ${e.images && e.images.length ? `<div class="card-images">${e.images.map((src, i) => `<img src="${src}" data-zoom="${i}" alt="截图" />`).join('')}</div>` : ''}
      ${(e.myAnswer || e.correctAnswer) ? `<div class="answer-line">
        ${e.myAnswer ? `<span class="wrong">我的答案: ${esc(e.myAnswer)}</span>` : ''}
        ${e.correctAnswer ? `<span class="right">正确答案: ${esc(e.correctAnswer)}</span>` : ''}
      </div>` : ''}
      ${e.reason ? `<div class="field"><div class="field-label">错因分析</div><div class="field-body">${esc(e.reason)}</div></div>` : ''}
      ${e.reflection ? `<details ${e.reflection.length < 160 ? 'open' : ''}><summary>正确思路 / 反思</summary><div class="field-body" style="margin-top:6px;">${esc(e.reflection)}</div></details>` : ''}
      <div class="meta">${e.date || ''}${e.time ? ' · 用时 ' + e.time + 's' : ''}</div>
    </article>
  `).join('');
}

function renderVocab(list) {
  let filtered = entries.filter(e => entryType(e) === 'vocab');
  const totalVocab = filtered.length;
  if (currentVocabSearch) {
    const q = currentVocabSearch.toLowerCase();
    filtered = filtered.filter(e =>
      (e.word || '').toLowerCase().includes(q) ||
      (e.definition || '').toLowerCase().includes(q) ||
      (e.example || '').toLowerCase().includes(q) ||
      (e.notes || '').toLowerCase().includes(q) ||
      (e.source || '').toLowerCase().includes(q)
    );
  }
  filtered.sort((a, b) => {
    if (currentVocabSort === 'date-asc') return (a.date || '').localeCompare(b.date || '');
    if (currentVocabSort === 'date-desc') return (b.date || '').localeCompare(a.date || '');
    if (currentVocabSort === 'word-asc') return (a.word || '').toLowerCase().localeCompare((b.word || '').toLowerCase());
    if (currentVocabSort === 'word-desc') return (b.word || '').toLowerCase().localeCompare((a.word || '').toLowerCase());
    return 0;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${totalVocab === 0 ? '还没有生词。在左侧录入你遇到的第一个单词。' : '当前搜索下没有结果。'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(e => `
    <article class="card" data-id="${e.id}">
      <div class="card-head">
        <div class="tags">
          <span class="tag" style="background:#f1eaf7; color:#7a4bb0; font-weight:600; font-size:14px; padding:3px 10px;">${esc(e.word || '')}</span>
          ${e.source ? `<span class="tag">${esc(e.source)}</span>` : ''}
        </div>
        <div class="card-actions">
          <button data-action="edit">编辑</button>
          <button data-action="delete" class="danger">删除</button>
        </div>
      </div>
      ${e.definition ? `<div class="field"><div class="field-label">释义</div><div class="field-body">${esc(e.definition)}</div></div>` : ''}
      ${e.example ? `<div class="field"><div class="field-label">例句 / 出处</div><div class="field-body">${esc(e.example)}</div></div>` : ''}
      ${e.notes ? `<div class="field"><div class="field-label">笔记</div><div class="field-body">${esc(e.notes)}</div></div>` : ''}
      <div class="meta">${e.date || ''}</div>
    </article>
  `).join('');
}

function renderRefTag(e) {
  const parts = [e.source, e.sectionNum, e.qnum].map(s => (s || '').trim()).filter(Boolean);
  return parts.length ? `<span class="tag">${esc(parts.join(' · '))}</span>` : '';
}

function renderImagePreviews() {
  const el = document.getElementById('imagePreviews');
  el.innerHTML = formImages.map((src, i) => `
    <div class="thumb">
      <img src="${src}" data-zoom-form="${i}" alt="" />
      <button type="button" class="remove" data-remove="${i}" title="移除">×</button>
    </div>
  `).join('');
}

function renderStats() {
  const mistakes = entries.filter(e => entryType(e) === 'mistake');
  const vocab = entries.filter(e => entryType(e) === 'vocab');
  const bySection = mistakes.reduce((a, e) => { a[e.section] = (a[e.section] || 0) + 1; return a; }, {});
  const byDiff = mistakes.reduce((a, e) => { a[e.difficulty] = (a[e.difficulty] || 0) + 1; return a; }, {});
  let html = `<span>错题 <b>${mistakes.length}</b></span><span>生词 <b>${vocab.length}</b></span>`;
  if (currentView === 'mistakes') {
    html += `<span>LR <b>${bySection.LR || 0}</b></span><span>RC <b>${bySection.RC || 0}</b></span><span>L3+ <b>${(byDiff.level3 || 0) + (byDiff.level4 || 0)}</b></span>`;
  }
  document.getElementById('stats').innerHTML = html;
}

function setSync(state, text) {
  const el = document.getElementById('syncIndicator');
  el.className = 'sync-indicator' + (state ? ' ' + state : '');
  el.textContent = text || '';
}

async function upsertRemote(entry) {
  const { id, ...data } = entry;
  const { error } = await withTimeout(
    sb.from('entries').upsert({ id, data, updated_at: new Date().toISOString() }),
    15000,
    '保存'
  );
  if (error) throw error;
}

async function deleteRemote(id) {
  const { error } = await withTimeout(sb.from('entries').delete().eq('id', id), 15000, '删除');
  if (error) throw error;
}

async function loadEntries() {
  setSync('syncing', '加载中...');
  try {
    const { data, error } = await withTimeout(
      sb.from('entries').select('id, data, created_at, updated_at').order('created_at', { ascending: false }),
      15000,
      '加载'
    );
    if (error) throw error;
    entries = data.map(row => ({ id: row.id, ...row.data }));
    setSync('', '已同步');
  } catch (e) {
    setSync('error', '加载失败');
    alert('加载失败: ' + e.message);
  }
}

document.getElementById('entryForm').addEventListener('submit', async ev => {
  ev.preventDefault();
  if (!currentUser) return;
  const data = {
    id: editingId || uid(),
    type: 'mistake',
    section: document.getElementById('section').value,
    difficulty: document.getElementById('difficulty').value,
    source: document.getElementById('source').value.trim(),
    sectionNum: document.getElementById('sectionNum').value.trim(),
    qnum: document.getElementById('qnum').value.trim(),
    qtype: document.getElementById('qtype').value.trim(),
    question: document.getElementById('question').value.trim(),
    myAnswer: document.getElementById('myAnswer').value.trim().toUpperCase(),
    correctAnswer: document.getElementById('correctAnswer').value.trim().toUpperCase(),
    reason: document.getElementById('reason').value.trim(),
    reflection: document.getElementById('reflection').value.trim(),
    date: document.getElementById('date').value || todayStr(),
    time: Number(document.getElementById('time').value) || null,
    images: formImages.slice(),
  };
  const submitBtn = document.getElementById('submitBtn');
  const originalLabel = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = '保存中...';
  setSync('syncing', '保存中...');
  try {
    await upsertRemote(data);
    if (editingId) {
      const i = entries.findIndex(e => e.id === editingId);
      if (i >= 0) entries[i] = data;
    } else {
      entries.unshift(data);
    }
    resetForm();
    render();
    setSync('', '已同步');
  } catch (e) {
    setSync('error', '保存失败');
    alert('保存到云端失败: ' + e.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = originalLabel;
  }
});

document.getElementById('cancelBtn').addEventListener('click', resetForm);

document.getElementById('list').addEventListener('click', async ev => {
  const btn = ev.target.closest('button[data-action]');
  if (!btn) return;
  const card = btn.closest('.card');
  const id = card?.dataset.id;
  if (!id) return;
  const entry = entries.find(e => e.id === id);
  const isVocab = entry && entryType(entry) === 'vocab';
  if (btn.dataset.action === 'edit') {
    if (isVocab) editVocab(id); else editEntry(id);
  } else if (btn.dataset.action === 'delete') {
    if (!confirm(isVocab ? '确定删除这个生词吗？' : '确定删除这道错题吗？')) return;
    setSync('syncing', '删除中...');
    try {
      await deleteRemote(id);
      entries = entries.filter(e => e.id !== id);
      render();
      setSync('', '已同步');
    } catch (e) {
      setSync('error', '删除失败');
      alert('删除失败: ' + e.message);
    }
  }
});

document.getElementById('importFile').addEventListener('change', ev => {
  const f = ev.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      if (!confirm(`导入 ${data.length} 条错题到云端？将合并到当前列表。`)) return;
      const existing = new Set(entries.map(e => e.id));
      const toImport = data.map(d => {
        if (!d.id || existing.has(d.id)) d.id = uid();
        return d;
      });
      setSync('syncing', `导入中 0/${toImport.length}...`);
      let done = 0;
      for (const entry of toImport) {
        await upsertRemote(entry);
        entries.unshift(entry);
        done++;
        setSync('syncing', `导入中 ${done}/${toImport.length}...`);
      }
      render();
      setSync('', '已同步');
    } catch (e) {
      setSync('error', '导入失败');
      alert('导入失败: ' + e.message);
    }
    ev.target.value = '';
  };
  reader.readAsText(f);
});

function addImageFromFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = () => {
    formImages.push(reader.result);
    renderImagePreviews();
  };
  reader.readAsDataURL(file);
}

function handlePastedItems(items) {
  if (!items) return false;
  let handled = false;
  for (const item of items) {
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      addImageFromFile(item.getAsFile());
      handled = true;
    }
  }
  return handled;
}

document.getElementById('question').addEventListener('paste', ev => {
  if (handlePastedItems(ev.clipboardData?.items)) ev.preventDefault();
});

document.addEventListener('paste', ev => {
  const active = document.activeElement;
  const inForm = active && active.closest && active.closest('#entryForm');
  if (!inForm) return;
  if (active.id === 'question') return;
  handlePastedItems(ev.clipboardData?.items);
});

const authOverlay = document.getElementById('authOverlay');
const authForm = document.getElementById('authForm');
const authEmail = document.getElementById('authEmail');
const authPassword = document.getElementById('authPassword');
const authError = document.getElementById('authError');
const authInfo = document.getElementById('authInfo');
const authSubmit = document.getElementById('authSubmit');

function showAuth() {
  authOverlay.classList.add('open');
  authError.textContent = '';
  authInfo.textContent = '';
}
function hideAuth() {
  authOverlay.classList.remove('open');
  authError.textContent = '';
  authInfo.textContent = '';
  authForm.reset();
}

document.querySelectorAll('.auth-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.toggle('active', b === btn));
    authMode = btn.dataset.tab;
    authSubmit.textContent = authMode === 'signin' ? '登录' : '注册';
    authPassword.autocomplete = authMode === 'signin' ? 'current-password' : 'new-password';
    authError.textContent = '';
    authInfo.textContent = '';
  });
});

authForm.addEventListener('submit', async ev => {
  ev.preventDefault();
  authError.textContent = '';
  authInfo.textContent = '';
  authSubmit.disabled = true;
  const originalLabel = authSubmit.textContent;
  authSubmit.textContent = '处理中...';
  const email = authEmail.value.trim();
  const password = authPassword.value;
  try {
    if (authMode === 'signin') {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    } else {
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      if (!data.session) {
        authInfo.textContent = '注册成功！请到邮箱确认后再登录。';
        authSubmit.disabled = false;
        authSubmit.textContent = originalLabel;
        return;
      }
    }
  } catch (e) {
    authError.textContent = e.message || '操作失败';
    authSubmit.disabled = false;
    authSubmit.textContent = originalLabel;
  }
});

document.getElementById('signOutBtn').addEventListener('click', async () => {
  if (!confirm('确定退出？')) return;
  await sb.auth.signOut();
});

function onSignedIn(user) {
  currentUser = user;
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('userBadge').style.display = 'flex';
  hideAuth();
}

function onSignedOut() {
  currentUser = null;
  entries = [];
  document.getElementById('userBadge').style.display = 'none';
  setSync('', '');
  render();
  showAuth();
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
    if (session) {
      onSignedIn(session.user);
      await loadEntries();
      render();
    } else if (event === 'INITIAL_SESSION') {
      onSignedOut();
    }
  } else if (event === 'SIGNED_OUT') {
    onSignedOut();
  } else if (event === 'TOKEN_REFRESHED') {
    if (session) currentUser = session.user;
  }
});

resetForm();
resetVocabForm();
render();
</script>
</body>
</html>
